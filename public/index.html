<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sebastian Angelo Meer's Marketplace">
    <title>Local Marketplace API</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 62.5%;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: #e0e6f0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-glow::before,
        .bg-glow::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            animation: float 8s ease-in-out infinite alternate;
        }

        .bg-glow::before {
            width: 60rem;
            height: 60rem;
            background: radial-gradient(circle, #6366f1, transparent 70%);
            top: -10%;
            left: -10%;
        }

        .bg-glow::after {
            width: 50rem;
            height: 50rem;
            background: radial-gradient(circle, #06b6d4, transparent 70%);
            bottom: -15%;
            right: -5%;
            animation-delay: 4s;
        }

        @keyframes float {
            to { transform: translate(40px, 30px) scale(1.08); }
        }

        .particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .cursor-glow {
            position: fixed;
            width: 28rem;
            height: 28rem;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: left 0.15s ease-out, top 0.15s ease-out;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 110rem;
            margin: 0 auto;
            padding: 3rem 2rem 6rem;
        }

        .hero {
            text-align: center;
            padding: 5rem 0 3rem;
        }

        .hero__title {
            font-family: 'Outfit', sans-serif;
            font-size: 5.4rem;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 1.2rem;
            animation: fadeInUp 0.6s ease-out 0.1s both;
        }

        .hero__title span {
            background: linear-gradient(135deg, #6366f1, #22d3ee, #a78bfa);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 5s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.6rem;
            margin: 4rem 0 2.4rem;
            animation: fadeInUp 0.6s ease-out 0.3s both;
        }

        .toolbar__info {
            font-size: 1.4rem;
            color: #64748b;
        }

        .toolbar__info strong {
            color: #a5b4fc;
            font-weight: 700;
        }

        .btn {
            font-family: 'Inter', sans-serif;
            font-size: 1.35rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            padding: 1.1rem 2.4rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
        }

        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn--primary {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            color: #fff;
            box-shadow: 0 0.4rem 1.4rem rgba(99, 102, 241, 0.35);
        }

        .btn--primary:hover {
            box-shadow: 0 0.6rem 2rem rgba(99, 102, 241, 0.5);
        }

        .btn--ghost {
            background: rgba(255, 255, 255, 0.06);
            color: #cbd5e1;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn--ghost:hover { background: rgba(255, 255, 255, 0.1); }

        .btn--success {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: #fff;
            box-shadow: 0 0.4rem 1.4rem rgba(34, 197, 94, 0.3);
        }

        .btn--danger {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .btn--warning {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }

        .btn--sm {
            font-size: 1.15rem;
            padding: 0.7rem 1.4rem;
            border-radius: 0.7rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(30rem, 1fr));
            gap: 2rem;
            animation: fadeInUp 0.6s ease-out 0.4s both;
        }

        .card {
            background: rgba(255, 255, 255, 0.035);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 1.6rem;
            overflow: hidden;
            transition: transform 0.35s ease, border-color 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
            transform-style: preserve-3d;
            perspective: 800px;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow:
                0 1.5rem 4rem rgba(99, 102, 241, 0.1),
                0 0 2rem rgba(99, 102, 241, 0.05),
                inset 0 0 3rem rgba(99, 102, 241, 0.02);
        }

        .card__shine {
            position: absolute;
            inset: 0;
            border-radius: 1.6rem;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card:hover .card__shine {
            opacity: 1;
        }

        .card__header {
            padding: 2rem 2rem 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
        }

        .card__category {
            display: inline-block;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            padding: 0.4rem 1rem;
            border-radius: 0.5rem;
            background: rgba(99, 102, 241, 0.12);
            color: #a5b4fc;
        }

        .card__id {
            font-size: 1.1rem;
            color: #475569;
            font-weight: 600;
        }

        .card__body {
            padding: 1.6rem 2rem;
            flex: 1;
        }

        .card__name {
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 0.6rem;
            line-height: 1.25;
        }

        .card__description {
            font-size: 1.3rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 1.4rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card__meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.2rem;
            color: #94a3b8;
        }

        .card__meta-icon {
            font-size: 1.4rem;
        }

        .card__footer {
            padding: 1.4rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card__price {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #22d3ee, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card__actions {
            display: flex;
            gap: 0.6rem;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 8rem 2rem;
        }

        .empty-state__icon {
            font-size: 6rem;
            margin-bottom: 2rem;
            opacity: 0.4;
        }

        .empty-state__title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 0.8rem;
        }

        .empty-state__desc {
            font-size: 1.4rem;
            color: #334155;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: #151b2e;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2rem;
            padding: 3.6rem;
            width: 92%;
            max-width: 52rem;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal {
            transform: translateY(0) scale(1);
        }

        .modal__title {
            font-family: 'Outfit', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
        }

        .modal__subtitle {
            font-size: 1.35rem;
            color: #64748b;
            margin-bottom: 2.8rem;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1.2rem 1.4rem;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            color: #e0e6f0;
            font-family: 'Inter', sans-serif;
            font-size: 1.4rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 8rem;
        }

        .form-group select option {
            background: #151b2e;
            color: #e0e6f0;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.6rem;
        }

        .modal__actions {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 3rem;
        }

        .toast-container {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toast {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.2rem;
            padding: 1.4rem 2rem;
            font-size: 1.35rem;
            color: #e0e6f0;
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 1rem;
            animation: slideInRight 0.4s ease-out, fadeOut 0.4s ease-in 2.6s forwards;
            min-width: 28rem;
        }

        .toast--success { border-left: 4px solid #22c55e; }
        .toast--error { border-left: 4px solid #ef4444; }
        .toast--warning { border-left: 4px solid #fbbf24; }

        .toast__icon {
            font-size: 1.8rem;
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        .detail__header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2.4rem;
        }

        .detail__name {
            font-family: 'Outfit', sans-serif;
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
        }

        .detail__close {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            width: 3.6rem;
            height: 3.6rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .detail__close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .detail__row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.3rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .detail__label {
            font-size: 1.2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
        }

        .detail__value {
            font-size: 1.5rem;
            color: #e0e6f0;
            text-align: right;
            max-width: 65%;
        }

        .detail__price-box {
            text-align: center;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(34, 211, 238, 0.08));
            border: 1px solid rgba(99, 102, 241, 0.15);
            padding: 2rem;
            border-radius: 1.2rem;
            margin-top: 2.4rem;
        }

        .detail__price-label {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .detail__price-value {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #22d3ee, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 1.3rem;
            color: #64748b;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .spinner {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            padding: 6rem;
        }

        .spinner__circle {
            width: 4rem;
            height: 4rem;
            border: 3px solid rgba(99, 102, 241, 0.15);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .hero__title { font-size: 3.6rem; }
            .products-grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .cursor-glow { display: none; }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2 class="modal__title">List a New Product</h2>
            <p class="modal__subtitle">Add your item to the community marketplace.</p>

            <form id="addProductForm">
                <div class="form-group">
                    <label for="productName">Product Name</label>
                    <input type="text" id="productName" placeholder="e.g. Vintage Record Player" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="productPrice">Price (₱)</label>
                        <input type="number" id="productPrice" placeholder="e.g. 2500" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="productCategory">Category</label>
                        <select id="productCategory" required>
                            <option value="">Select category...</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Music">Music</option>
                            <option value="Fashion">Fashion</option>
                            <option value="Books">Books</option>
                            <option value="Sports">Sports</option>
                            <option value="Furniture">Furniture</option>
                            <option value="Home & Garden">Home & Garden</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="productDescription">Description</label>
                    <textarea id="productDescription" placeholder="Describe your item — condition, features, etc."
                        required></textarea>
                </div>

                <div class="form-group">
                    <label for="productSeller">Your Name (Seller)</label>
                    <input type="text" id="productSeller" placeholder="e.g. Juan Dela Cruz" required>
                </div>

                <div class="modal__actions">
                    <button type="button" class="btn btn--ghost" onclick="closeAddModal()">Cancel</button>
                    <button type="submit" class="btn btn--success">✨ Add Product</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal" id="detailContent"></div>
    </div>

    <div class="wrapper">
        <section class="hero">
            <h1 class="hero__title">Welcome to <span>Local Marketplace</span> API</h1>
        </section>

        <div class="toolbar">
            <p class="toolbar__info">
                Showing <strong id="productCount">0</strong> products in the marketplace
            </p>
            <button class="btn btn--primary" id="addProductBtn" onclick="openAddModal()">
                ＋ Add Product
            </button>
        </div>

        <div class="products-grid" id="productsGrid">
            <div class="spinner">
                <div class="spinner__circle"></div>
            </div>
        </div>
    </div>

    <footer>Sebastian Angelo Meer's Marketplace</footer>

    <script>
        const API_URL = '/api/v1/products';
        const productsGrid = document.getElementById('productsGrid');
        const productCount = document.getElementById('productCount');
        const addModal = document.getElementById('addModal');
        const detailModal = document.getElementById('detailModal');
        const detailContent = document.getElementById('detailContent');
        const addProductForm = document.getElementById('addProductForm');
        const toastContainer = document.getElementById('toastContainer');

        const categoryIcons = {
            'Electronics': '💻',
            'Music': '🎸',
            'Fashion': '👜',
            'Books': '📚',
            'Sports': '🚴',
            'Furniture': '🪑',
            'Home & Garden': '🌿',
            'Other': '📦',
        };

        const categoryColors = {
            'Electronics': 'rgba(99, 102, 241, 0.15)',
            'Music': 'rgba(236, 72, 153, 0.15)',
            'Fashion': 'rgba(168, 85, 247, 0.15)',
            'Books': 'rgba(34, 197, 94, 0.15)',
            'Sports': 'rgba(251, 146, 60, 0.15)',
            'Furniture': 'rgba(234, 179, 8, 0.15)',
            'Home & Garden': 'rgba(16, 185, 129, 0.15)',
            'Other': 'rgba(148, 163, 184, 0.15)',
        };

        function formatPrice(price) {
            return '₱' + Number(price).toLocaleString();
        }

        function showToast(message, type = 'success') {
            const icons = { success: '✅', error: '❌', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.className = `toast toast--${type}`;
            toast.innerHTML = `
                <span class="toast__icon">${icons[type]}</span>
                <span>${message}</span>
            `;
            toastContainer.appendChild(toast);
            setTimeout(() => toast.remove(), 3200);
        }

        async function fetchProducts() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();

                if (data.status === 'success') {
                    renderProducts(data.data.products);
                }
            } catch (err) {
                productsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon">⚠️</div>
                        <h3 class="empty-state__title">Connection Error</h3>
                        <p class="empty-state__desc">Could not load products. Make sure the API server is running.</p>
                    </div>
                `;
            }
        }

        function renderProducts(products) {
            productCount.textContent = products.length;

            if (products.length === 0) {
                productsGrid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state__icon">🛒</div>
                        <h3 class="empty-state__title">No products yet</h3>
                        <p class="empty-state__desc">Be the first to list an item on the marketplace!</p>
                    </div>
                `;
                return;
            }

            productsGrid.innerHTML = products.map(product => {
                const icon = categoryIcons[product.category] || '📦';
                const catBg = categoryColors[product.category] || categoryColors['Other'];

                return `
                    <div class="card" onclick="viewProduct(${product.id})" onmousemove="tiltCard(event, this)" onmouseleave="resetCard(this)">
                        <div class="card__shine"></div>
                        <div class="card__header">
                            <span class="card__category" style="background: ${catBg}">
                                ${icon} ${product.category}
                            </span>
                            <span class="card__id">#${product.id}</span>
                        </div>
                        <div class="card__body">
                            <h3 class="card__name">${product.name}</h3>
                            <p class="card__description">${product.description}</p>
                            <div class="card__meta">
                                <span class="card__meta-icon">👤</span>
                                <span>${product.seller}</span>
                            </div>
                        </div>
                        <div class="card__footer">
                            <span class="card__price">${formatPrice(product.price)}</span>
                            <div class="card__actions" onclick="event.stopPropagation()">
                                <button class="btn btn--warning btn--sm" onclick="updateProduct(${product.id})">
                                    ✏️ Edit
                                </button>
                                <button class="btn btn--danger btn--sm" onclick="deleteProduct(${product.id})">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function tiltCard(e, card) {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            const rotateX = ((y - centerY) / centerY) * -6;
            const rotateY = ((x - centerX) / centerX) * 6;

            card.style.transform = `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-5px)`;

            const shine = card.querySelector('.card__shine');
            if (shine) {
                const angle = Math.atan2(y - centerY, x - centerX) * (180 / Math.PI);
                shine.style.background = `linear-gradient(${angle + 90}deg, rgba(255,255,255,0.06) 0%, transparent 60%)`;
            }
        }

        function resetCard(card) {
            card.style.transform = '';
            const shine = card.querySelector('.card__shine');
            if (shine) shine.style.background = '';
        }

        async function viewProduct(id) {
            try {
                const res = await fetch(`${API_URL}/${id}`);
                const data = await res.json();

                if (data.status === 'success') {
                    const p = data.data.product;
                    const icon = categoryIcons[p.category] || '📦';

                    detailContent.innerHTML = `
                        <div class="detail__header">
                            <h2 class="detail__name">${icon} ${p.name}</h2>
                            <button class="detail__close" onclick="closeDetailModal()">&times;</button>
                        </div>

                        <div class="detail__row">
                            <span class="detail__label">Category</span>
                            <span class="detail__value">${p.category}</span>
                        </div>
                        <div class="detail__row">
                            <span class="detail__label">Seller</span>
                            <span class="detail__value">${p.seller}</span>
                        </div>
                        <div class="detail__row">
                            <span class="detail__label">Description</span>
                            <span class="detail__value">${p.description}</span>
                        </div>
                        <div class="detail__row">
                            <span class="detail__label">Product ID</span>
                            <span class="detail__value">#${p.id}</span>
                        </div>

                        <div class="detail__price-box">
                            <div class="detail__price-label">Price</div>
                            <div class="detail__price-value">${formatPrice(p.price)}</div>
                        </div>

                        <div class="modal__actions" style="margin-top: 2.4rem;">
                            <button class="btn btn--warning btn--sm" onclick="updateProduct(${p.id}); closeDetailModal();">
                                ✏️ Edit Product
                            </button>
                            <button class="btn btn--danger btn--sm" onclick="deleteProduct(${p.id}); closeDetailModal();">
                                🗑️ Delete Product
                            </button>
                        </div>
                    `;

                    detailModal.classList.add('active');
                }
            } catch (err) {
                showToast('Failed to load product details.', 'error');
            }
        }

        addProductForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const body = {
                name: document.getElementById('productName').value.trim(),
                price: Number(document.getElementById('productPrice').value),
                category: document.getElementById('productCategory').value,
                description: document.getElementById('productDescription').value.trim(),
                seller: document.getElementById('productSeller').value.trim(),
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await res.json();

                if (data.status === 'success') {
                    showToast(`"${body.name}" has been listed!`, 'success');
                    closeAddModal();
                    addProductForm.reset();
                    fetchProducts();
                } else {
                    showToast(data.message, 'error');
                }
            } catch (err) {
                showToast('Failed to create product.', 'error');
            }
        });

        async function updateProduct(id) {
            showToast('🚧 Update feature is not yet implemented. Coming soon!', 'warning');
        }

        async function deleteProduct(id) {
            showToast('🚧 Delete feature is not yet implemented. Coming soon!', 'warning');
        }

        function openAddModal() {
            addModal.classList.add('active');
        }

        function closeAddModal() {
            addModal.classList.remove('active');
        }

        function closeDetailModal() {
            detailModal.classList.remove('active');
        }

        addModal.addEventListener('click', (e) => {
            if (e.target === addModal) closeAddModal();
        });

        detailModal.addEventListener('click', (e) => {
            if (e.target === detailModal) closeDetailModal();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAddModal();
                closeDetailModal();
            }
        });

        const cursorGlow = document.getElementById('cursorGlow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
        });

        const canvas = document.getElementById('particlesCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.5,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3,
                opacity: Math.random() * 0.4 + 0.1,
                hue: Math.random() > 0.5 ? 240 : 190,
            };
        }

        function initParticles() {
            resizeCanvas();
            particles = [];
            const count = Math.floor((canvas.width * canvas.height) / 18000);
            for (let i = 0; i < count; i++) {
                particles.push(createParticle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.opacity})`;
                ctx.fill();
            });

            requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', initParticles);
        initParticles();
        animateParticles();

        fetchProducts();
    </script>
</body>

</html>
